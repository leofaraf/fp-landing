<body class="selection:bg-primary-fixed selection:text-on-primary-fixed">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        const { createRoot } = ReactDOM;
        const { MemoryRouter, Routes, Route, Link, useNavigate, useLocation } = ReactRouterDOM;

        // --- Data ---
        const TRANSLATIONS = {
            ru: {
                title: "Семейный архив Фарафоновых",
                desc: "Сохраняем историю, знания и воспоминания нашей семьи для будущих поколений.",
                descFull: "Цифровой репозиторий, посвященный сохранению наследия, историй и визуальной истории рода Фарафоновых для будущих поколений.",
                badge: "Защищенный частный архив",
                cta: "Перейти к порталу",
                request: "Запросить доступ",
                tree: "Семейное древо",
                stories: "Устные истории",
                visual: "Визуальное наследие",
                footer: "© Семья Фарафоновых",
                link: "Частный семейный архив",
                access: "ЧАСТНЫЙ ДОСТУП",
                langName: "Русский"
            },
            en: {
                title: "Farafonov Family Archive",
                desc: "Preserving our family's history, knowledge, and memories for generations.",
                descFull: "A digital repository dedicated to preserving the heritage, stories, and visual history of the Farafonov lineage for future generations.",
                badge: "Secured Private Archive",
                cta: "Go to Portal",
                request: "Request Access",
                tree: "Family Tree",
                stories: "Oral Histories",
                visual: "Visual Legacy",
                footer: "© Farafonov Family",
                link: "Private family archive",
                access: "PRIVATE ACCESS",
                langName: "English"

            de: {

                badge: "Geschütztes Privates Archiv",
                cta: "Zum Portal",
                request: "Zugang anfordern",
                tree: "Stammbaum",
                stories: "Zeitzeugnisse",
                visual: "Visuelles Erbe",
                footer: "© Familie Farafonov",

        };

        // --- Shared Components ---

        const LanguageSwitcher = ({ currentLang, setLang }) => (
            <div className="segmented-control flex items-center font-label-sm text-label-sm text-secondary">
                {Object.keys(TRANSLATIONS).map(lang => (
                    <button 
                        key={lang}
                        onClick={() => setLang(lang)}
                        className={`segmented-item capitalize ${currentLang === lang ? 'active' : ''}`}
                    >
                        {TRANSLATIONS[lang].langName}
                    </button>
                ))}
            </div>
        );

        const DesktopLayout = ({ lang, setLang }) => {
            const t = TRANSLATIONS[lang];
            return (
                <div className="h-screen flex flex-col overflow-hidden">
                    <header className="px-margin-desktop py-8 max-w-container-max mx-auto w-full flex-shrink-0">
                        <div className="flex justify-between items-center">

                                </button>
                            </div>
                        </div>
                    </header>

                    <main className="flex-grow flex items-center justify-center relative px-margin-desktop hero-gradient py-4">

                                {t.desc}
                            </p>
                            <p className="font-body-md text-body-md text-secondary opacity-60 mb-8">
                                {lang === 'ru' ? 'Частный доступ только для членов семьи.' : 
                                 lang === 'de' ? 'Privater Zugang nur für Familienmitglieder.' : 
                                 'Private access for family members only.'}
                            </p>
                            <div className="flex flex-col sm:flex-row items-center justify-center gap-gutter">
                                <button className="btn-hover-effect bg-primary text-white font-label-sm text-label-sm px-10 py-4 rounded-lg shadow-xl shadow-primary/10 hover:bg-primary-container transition-all duration-300 flex items-center gap-3 group">
                                    {t.cta}
                                    <span className="material-symbols-outlined group-hover:translate-x-1 transition-transform">arrow_forward</span>
                                </button>
                                <button className="btn-hover-effect text-secondary font-label-sm text-label-sm px-8 py-4 rounded-lg border border-outline-variant hover:bg-surface-container-low transition-all">
                                    {t.request}
                                </button>
                            </div>

                                <div className="flex flex-col items-center gap-3">
                                    <span className="material-symbols-outlined text-4xl">{lang === 'ru' ? 'account_tree' : 'menu_book'}</span>
                                    <span className="font-label-sm text-label-sm">{t.tree}</span>
                                </div>
                                <div className="flex flex-col items-center gap-3">
                                    <span className="material-symbols-outlined text-4xl">auto_stories</span>
                                    <span className="font-label-sm text-label-sm">{t.stories}</span>

                                <div className="flex flex-col items-center gap-3">

                            </div>

                        <p className="font-label-sm text-label-sm text-secondary opacity-60 tracking-wider">

                        </p>
                        <div className="mt-4 flex gap-6">

        const MobileLayout = ({ lang, setLang }) => {

                        <div className="font-headline-md text-headline-md font-bold text-primary dark:text-primary-fixed">farafonov.org</div>
                        <button 
                            onClick={() => {
                                const langs = Object.keys(TRANSLATIONS);
                                const nextIndex = (langs.indexOf(lang) + 1) % langs.length;
                                setLang(langs[nextIndex]);
                            }}
                            className="flex items-center gap-2 px-3 py-1 bg-secondary-container rounded-full text-secondary font-label-sm text-label-sm"
                        >
                            <span className="material-symbols-outlined text-[18px]">language</span>
                            <span>{t.langName}</span>
                        </button>
                    </nav>

                    <main className="flex-grow flex flex-col items-center justify-center relative px-margin-mobile text-center">
                        <div className="absolute inset-0 bg-pattern pointer-events-none"></div>
                        
                        <div className="relative z-10 max-w-sm flex flex-col items-center gap-6 animate-fade-in">
                            <div className="w-16 h-16 bg-primary-container rounded-xl flex items-center justify-center text-on-primary-container shadow-sm border border-outline-variant/30">
                                <span className="material-symbols-outlined text-4xl" style={{fontVariationSettings: "'FILL' 1"}}>history_edu</span>
                            </div>
                            <div className="space-y-4">
                                <h1 className="font-display-lg-mobile text-display-lg-mobile text-primary tracking-tight">
                                    {t.title}
                                </h1>
                                <p className="font-body-md text-body-md text-secondary leading-relaxed px-2">
                                    {t.descFull}
                                </p>
                            </div>

                            <div className="w-full flex flex-col items-center gap-4 pt-4">
                                <button className="w-full py-4 bg-primary text-on-primary rounded-xl font-body-lg text-body-lg font-bold shadow-lg active:scale-95 transition-all duration-200 flex items-center justify-center gap-2">
                                    {t.cta}
                                    <span className="material-symbols-outlined">arrow_forward</span>
                                </button>
                                <div className="flex items-center gap-2 text-secondary/70">
                                    <span className="material-symbols-outlined text-[18px]">lock</span>
                                    <span className="font-label-sm text-label-sm uppercase tracking-widest">{t.access}</span>

                            </div>

                                <img 
                                    className="w-full h-full object-cover grayscale mix-blend-multiply opacity-60" 
                                    src="https://lh3.googleusercontent.com/aida-public/AB6AXuCAuMWLRc-js6nXDHJ_Opc95pZBMG19aV2NoDQ_rPJGp70-GJfX_DN6dwightkEqn2I8nRur3A93BxKWGj0oMV90c-e19VLriWqfO5DWsTpfXJf2Q9mc67zGSyswf6QI_GQY_mvoFkjY279q_uAZsNPzL3ebfvR02ON_tZ6IZ-qwZMjmvsTeBFH7hCmI8i6nNFt7SfDUgE4jyvBe5FS3zf27-jFdqKT6wO9Z5g9lot0X1bgcdITejZ8Ekx8Cx9D1sNlG_cr80Kq8ck"
                                    alt="Family History"
                                />
                            </div>
                        </div>
                    </main>

                    <footer className="bg-surface dark:bg-background border-t border-outline-variant dark:border-outline py-6 w-full z-50 flex-shrink-0">
                        <div className="flex flex-col items-center justify-center gap-2 w-full">
                            <span className="font-label-sm text-label-sm text-secondary dark:text-secondary-fixed-dim">
                                {t.footer}
                            </span>
                            <div className="flex gap-4">
                                <a className="font-label-sm text-label-sm text-secondary dark:text-secondary-fixed-dim hover:text-primary underline transition-all duration-200" href="#">
                                    {t.link}
                                </a>
                            </div>
                        </div>
                    </footer>
                </div>
            );
        };

        // --- Main App ---

        const App = () => {
            const [lang, setLang] = useState('ru');
            const [isMobile, setIsMobile] = useState(window.innerWidth < 768);

            useEffect(() => {
                const handleResize = () => setIsMobile(window.innerWidth < 768);
                window.addEventListener('resize', handleResize);
                return () => window.removeEventListener('resize', handleResize);
            }, []);

            return (
                <Routes>
                    <Route 
                        path="/" 
                        element={
                            isMobile 
                                ? <MobileLayout lang={lang} setLang={setLang} /> 
                                : <DesktopLayout lang={lang} setLang={setLang} />
                        } 
                    />
                </Routes>
            );
        };

        // --- Initializer ---
        const rootElement = document.getElementById("root");
        const root = createRoot(rootElement);
        root.render(
            <MemoryRouter>
                <App />
            </MemoryRouter>
        );
    </script>
</body>
</html>
